name: Build and Release

on:
  push:
    tags:
      - 'v*' 
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: |
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - run: pyinstaller --onefile --name proxy-linux-x86_64 main.py
      - uses: actions/upload-artifact@v4
        with:
          name: linux_x86_64
          path: dist/proxy-linux-x86_64

  build-termux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: alpine_latest
          run: |
            apk update && apk add --no-cache python3 py3-pip build-base python3-dev binutils
            pip install pyinstaller --break-system-packages
            if [ -f requirements.txt ]; then pip install -r requirements.txt --break-system-packages; fi
            pyinstaller --onefile --name proxy-termux-arm64 main.py
      - uses: actions/upload-artifact@v4
        with:
          name: termux_arm64
          path: dist/proxy-termux-arm64

  release:
    needs: [build-linux-x86_64, build-termux-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux_x86_64/proxy-linux-x86_64
            artifacts/termux_arm64/proxy-termux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
