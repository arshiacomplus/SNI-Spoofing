name: Build Proxy Executables

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  build-linux-x86_64:
    name: Build for Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name proxy-linux-x86_64 main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: dist/proxy-linux-x86_64
          retention-days: 7


  build-termux-arm64:
    name: Build for Termux (ARM64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build on ARM64 Emulator (Alpine)
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: alpine_latest
          run: |
            apk update
            apk add --no-cache python3 py3-pip build-base python3-dev binutils
            
            pip install pyinstaller --break-system-packages
            if [ -f requirements.txt ]; then pip install -r requirements.txt --break-system-packages; fi
            pyinstaller --onefile --name proxy-termux-arm64 main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: termux-arm64
          path: dist/proxy-termux-arm64
          retention-days: 7
